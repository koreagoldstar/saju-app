<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10년 대운 분석</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background:
        radial-gradient(circle at 14% 15%, rgba(217, 119, 6, 0.2), transparent 35%),
        radial-gradient(circle at 84% 78%, rgba(30, 58, 138, 0.22), transparent 40%),
        #020617;
    }
    .spark::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 22% 21%, rgba(250, 204, 21, .7), transparent 60%),
        radial-gradient(2px 2px at 72% 28%, rgba(250, 204, 21, .55), transparent 60%),
        radial-gradient(2px 2px at 58% 76%, rgba(255,255,255,.5), transparent 60%),
        radial-gradient(2px 2px at 34% 66%, rgba(250, 204, 21, .55), transparent 60%);
      animation: twinkle 8s ease-in-out infinite alternate;
    }
    .reveal { opacity: 0; transform: translateY(16px); transition: all .55s ease; }
    .reveal.in { opacity: 1; transform: translateY(0); }
    @keyframes twinkle { from { opacity: .35; } to { opacity: .95; } }
  </style>
</head>
<body class="spark min-h-screen text-slate-100">
  <main class="mx-auto max-w-5xl px-4 py-8">
    <a href="/" class="text-sm text-amber-300 underline">메인으로</a>
    <section class="reveal mt-3 overflow-hidden rounded-3xl border border-amber-300/30 bg-gradient-to-br from-slate-900 to-slate-950 p-6">
      <div class="grid gap-5 md:grid-cols-[120px_1fr] md:items-center">
        <img src="/assets/images/icon-10year-daewoon.png" alt="10년 대운 분석" class="h-28 w-28 rounded-2xl border border-amber-300/40 object-cover" />
        <div>
          <p class="text-xs uppercase tracking-[0.2em] text-amber-200">Luck Cycle Premium</p>
          <h1 class="mt-2 text-3xl font-bold text-stone-100">10년 대운 분석</h1>
          <p class="mt-2 text-sm leading-6 text-stone-300">10년 단위 운세 사이클과 기회 구간을 타임라인으로 시각화합니다.</p>
        </div>
      </div>
    </section>

    <section class="mt-6 grid gap-6 lg:grid-cols-2">
      <form id="form" class="reveal rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4 space-y-3">
        <p class="text-sm font-semibold text-amber-200">입력 폼</p>
        <input name="name" required placeholder="이름" class="w-full rounded-lg bg-slate-800 px-3 py-2" />
        <input type="date" name="birthDate" required class="w-full rounded-lg bg-slate-800 px-3 py-2" />
        <div class="grid grid-cols-2 gap-3">
          <input type="number" name="birthHour" min="0" max="23" required placeholder="시" class="rounded-lg bg-slate-800 px-3 py-2" />
          <input type="number" name="birthMinute" min="0" max="59" required placeholder="분" class="rounded-lg bg-slate-800 px-3 py-2" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <select name="gender" class="rounded-lg bg-slate-800 px-3 py-2"><option value="male">남성</option><option value="female">여성</option></select>
          <select name="calendarType" class="rounded-lg bg-slate-800 px-3 py-2"><option value="solar">양력</option><option value="lunar">음력</option></select>
        </div>
        <button class="w-full rounded-lg bg-gradient-to-r from-amber-500 to-yellow-300 px-4 py-2 font-semibold text-slate-900">대운 타임라인 보기</button>
      </form>

      <div class="reveal rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4">
        <p class="text-sm font-semibold text-amber-200">결과물</p>
        <div id="timeline" class="mt-3 space-y-2"></div>
        <pre id="result" class="mt-3 max-h-[260px] overflow-auto rounded-lg bg-black/30 p-3 text-xs whitespace-pre-wrap"></pre>
      </div>
    </section>
  </main>
  <script>
    const form = document.getElementById("form");
    const result = document.getElementById("result");
    const timeline = document.getElementById("timeline");
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => entry.isIntersecting && entry.target.classList.add("in"));
    }, { threshold: 0.1 });
    document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(form);
      const payload = {
        name: f.get("name"),
        birthDate: f.get("birthDate"),
        birthHour: Number(f.get("birthHour")),
        birthMinute: Number(f.get("birthMinute")),
        gender: f.get("gender"),
        calendarType: f.get("calendarType")
      };
      const res = await fetch("/api/premium-daewoon", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) return alert(data.message || "요청 실패");
      timeline.innerHTML = (data.daYunTimeline || []).map((x) =>
        '<div class="rounded-lg border border-amber-300/20 bg-black/30 p-2 text-xs">' +
        '<p class="font-semibold text-amber-200">' + (x.ganZhi || "-") + "</p>" +
        '<p class="text-stone-300">' + x.startYear + "~" + x.endYear + " · 나이 " + x.startAge + "~" + x.endAge + "</p>" +
        "</div>"
      ).join("");
      result.textContent = data.report;
    });
  </script>
</body>
</html>
