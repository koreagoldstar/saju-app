<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>꿈해몽 검색</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-3xl px-4 py-8">
    <div class="mb-6 flex items-center justify-between">
      <h1 class="text-2xl font-bold">꿈해몽 — 키워드로 찾기</h1>
      <div class="space-x-2 text-sm">
        <a class="text-amber-300 underline" href="/saju">사주/궁합</a>
        <a class="text-amber-300 underline" href="/tarot">타로</a>
      </div>
    </div>

    <section class="rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4">
      <form id="dream-form" class="flex gap-2">
        <input name="keyword" required placeholder="예: 물, 뱀, 돈, 시험" class="flex-1 rounded-lg bg-slate-800 px-3 py-2" />
        <button class="rounded-lg bg-amber-400 px-4 py-2 font-semibold text-slate-900">검색</button>
      </form>

      <div class="mt-4 space-y-3 rounded-lg bg-black/30 p-4">
        <p id="matched" class="text-sm text-amber-200"></p>
        <p id="interpretation" class="text-sm leading-7 text-slate-200"></p>
        <p id="advice" class="text-sm leading-7 text-slate-300"></p>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById("dream-form");
    const matchedEl = document.getElementById("matched");
    const interpretationEl = document.getElementById("interpretation");
    const adviceEl = document.getElementById("advice");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(form);
      const res = await fetch("/api/dream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keyword: f.get("keyword") })
      });
      const data = await res.json();
      if (!res.ok) {
        alert(data.message || "요청 실패");
        return;
      }
      matchedEl.textContent = data.matched ? "매칭 키워드: " + data.keyword : "매칭 결과 없음 (기본 해석 제공)";
      interpretationEl.textContent = data.interpretation || "";
      adviceEl.textContent = "조언: " + (data.advice || "");
    });
  </script>
</body>
</html>
