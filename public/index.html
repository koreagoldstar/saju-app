<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saju Insight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
      @font-face {
        font-family: "GmarketSans";
        src: url("https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff") format("woff");
        font-weight: 500;
        font-style: normal;
      }

      :root {
        --wood: #b8e6c8;
        --fire: #ffc9b9;
        --earth: #ffe4b8;
        --metal: #e3e6ef;
        --water: #bfdcff;
      }

      body {
        font-family: "GmarketSans", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .glass {
        background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.22);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 20px 60px rgba(22, 40, 90, 0.15);
      }

      .icon-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
    </style>
  </head>
  <body class="min-h-screen text-slate-800 bg-gradient-to-br from-sky-100 via-indigo-100 to-emerald-100">
    <div class="pointer-events-none fixed -left-24 top-8 h-80 w-80 rounded-full bg-cyan-200/40 blur-3xl"></div>
    <div class="pointer-events-none fixed bottom-0 right-0 h-96 w-96 rounded-full bg-violet-200/40 blur-3xl"></div>

    <main class="relative mx-auto w-full max-w-6xl px-4 py-10 md:px-8">
      <section class="glass rounded-3xl p-8">
        <p class="text-xs uppercase tracking-[0.22em] text-indigo-500">Saju Healing Insight</p>
        <h1 class="mt-2 text-3xl font-bold text-slate-800 md:text-4xl">사주 만세력 & AI 힐링 리포트</h1>
        <p class="mt-3 text-slate-600">차분한 명상 앱 스타일로, 사주 8자와 해석을 편안하게 확인해보세요.</p>
      </section>

      <section class="mt-6 grid gap-6 lg:grid-cols-2">
        <div class="glass rounded-3xl p-6">
          <h2 class="text-xl font-semibold text-slate-800 icon-badge"><i data-lucide="clipboard-pen-line" class="h-5 w-5 text-indigo-500"></i>입력 폼</h2>
          <form id="saju-form" class="mt-5 space-y-4">
            <div>
              <label class="mb-1 block text-sm text-slate-600 icon-badge"><i data-lucide="user-round" class="h-4 w-4 text-indigo-400"></i>이름</label>
              <input name="name" required class="w-full rounded-xl border border-white/40 bg-white/70 px-4 py-3 outline-none transition focus:border-indigo-300" />
            </div>
            <div>
              <label class="mb-1 block text-sm text-slate-600 icon-badge"><i data-lucide="calendar-days" class="h-4 w-4 text-indigo-400"></i>생년월일</label>
              <input type="date" name="birthDate" required class="w-full rounded-xl border border-white/40 bg-white/70 px-4 py-3 outline-none transition focus:border-indigo-300" />
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="mb-1 block text-sm text-slate-600 icon-badge"><i data-lucide="clock-3" class="h-4 w-4 text-indigo-400"></i>태어난 시</label>
                <input type="number" name="birthHour" min="0" max="23" required class="w-full rounded-xl border border-white/40 bg-white/70 px-4 py-3 outline-none transition focus:border-indigo-300" />
              </div>
              <div>
                <label class="mb-1 block text-sm text-slate-600 icon-badge"><i data-lucide="clock-9" class="h-4 w-4 text-indigo-400"></i>태어난 분</label>
                <input type="number" name="birthMinute" min="0" max="59" required class="w-full rounded-xl border border-white/40 bg-white/70 px-4 py-3 outline-none transition focus:border-indigo-300" />
              </div>
            </div>
            <div>
              <label class="mb-1 block text-sm text-slate-600 icon-badge"><i data-lucide="venus-and-mars" class="h-4 w-4 text-indigo-400"></i>성별</label>
              <select name="gender" required class="w-full rounded-xl border border-white/40 bg-white/70 px-4 py-3 outline-none transition focus:border-indigo-300">
                <option value="">선택</option>
                <option value="male">남성</option>
                <option value="female">여성</option>
              </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <label class="flex items-center gap-2 rounded-xl border border-white/40 bg-white/70 px-4 py-3">
                <input type="radio" name="calendarType" value="solar" checked />
                <span>양력</span>
              </label>
              <label class="flex items-center gap-2 rounded-xl border border-white/40 bg-white/70 px-4 py-3">
                <input type="radio" name="calendarType" value="lunar" />
                <span>음력</span>
              </label>
            </div>
            <button id="submit-btn" type="submit" class="w-full rounded-xl bg-indigo-500 px-4 py-3 font-semibold text-white transition hover:bg-indigo-400 disabled:cursor-not-allowed disabled:bg-indigo-300 icon-badge justify-center">
              <i data-lucide="sparkles" class="h-4 w-4"></i>
              사주 결과 보기
            </button>

            <div id="loading-wrap" class="hidden rounded-xl border border-white/40 bg-white/60 p-3">
              <div class="flex items-center gap-3">
                <lottie-player
                  src="https://assets2.lottiefiles.com/packages/lf20_j1adxtyb.json"
                  background="transparent"
                  speed="1"
                  style="width: 56px; height: 56px"
                  loop
                  autoplay
                ></lottie-player>
                <p id="loading-text" class="text-sm text-indigo-600">해석 중입니다... 잠시만 기다려주세요.</p>
              </div>
            </div>
          </form>
        </div>

        <div class="glass rounded-3xl p-6">
          <h2 class="text-xl font-semibold text-slate-800 icon-badge"><i data-lucide="moon-star" class="h-5 w-5 text-indigo-500"></i>결과</h2>
          <p id="empty-message" class="mt-5 text-slate-600">입력 후 결과가 여기에 표시됩니다.</p>

          <div class="mt-4 rounded-2xl border border-white/40 bg-white/55 p-4">
            <p class="text-xs font-semibold text-slate-500">오행 파스텔 팔레트</p>
            <div class="mt-3 grid grid-cols-5 gap-2 text-xs font-medium">
              <span class="rounded-lg px-2 py-2 text-center" style="background: var(--wood)">목</span>
              <span class="rounded-lg px-2 py-2 text-center" style="background: var(--fire)">화</span>
              <span class="rounded-lg px-2 py-2 text-center" style="background: var(--earth)">토</span>
              <span class="rounded-lg px-2 py-2 text-center" style="background: var(--metal)">금</span>
              <span class="rounded-lg px-2 py-2 text-center" style="background: var(--water)">수</span>
            </div>
          </div>

          <div id="result-content" class="mt-5 hidden space-y-4">
            <p id="profile-line" class="text-sm text-slate-600"></p>
            <p id="calendar-line" class="text-sm text-slate-600"></p>
            <p id="provider-line" class="text-xs text-slate-500"></p>

            <div class="grid grid-cols-2 gap-3">
              <div class="rounded-2xl p-4" style="background: var(--wood)"><p class="text-xs text-slate-600">연주</p><p id="year-pillar" class="text-2xl font-bold"></p></div>
              <div class="rounded-2xl p-4" style="background: var(--fire)"><p class="text-xs text-slate-600">월주</p><p id="month-pillar" class="text-2xl font-bold"></p></div>
              <div class="rounded-2xl p-4" style="background: var(--earth)"><p class="text-xs text-slate-600">일주</p><p id="day-pillar" class="text-2xl font-bold"></p></div>
              <div class="rounded-2xl p-4" style="background: var(--water)"><p class="text-xs text-slate-600">시주</p><p id="time-pillar" class="text-2xl font-bold"></p></div>
            </div>

            <div class="rounded-2xl border border-white/50 bg-white/65 p-4">
              <p class="text-xs text-slate-500">사주 8자</p>
              <p id="eight-char" class="mt-1 text-lg font-semibold"></p>
            </div>
            <div class="rounded-2xl border border-white/50 bg-white/65 p-4">
              <p class="text-xs text-slate-500">AI 운세 풀이</p>
              <p id="ai-fortune" class="mt-2 leading-7 text-slate-700"></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("saju-form");
      const emptyMessage = document.getElementById("empty-message");
      const resultContent = document.getElementById("result-content");
      const submitBtn = document.getElementById("submit-btn");
      const loadingWrap = document.getElementById("loading-wrap");

      function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        submitBtn.textContent = isLoading ? "해석 중..." : "사주 결과 보기";
        loadingWrap.classList.toggle("hidden", !isLoading);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(form);
        const payload = {
          name: formData.get("name"),
          birthDate: formData.get("birthDate"),
          birthHour: Number(formData.get("birthHour")),
          birthMinute: Number(formData.get("birthMinute")),
          gender: formData.get("gender"),
          calendarType: formData.get("calendarType"),
        };

        try {
          setLoading(true);
          const response = await fetch("/api/saju", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const raw = await response.text();
          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            throw new Error("API 응답이 JSON 형식이 아닙니다. 배포 설정에서 /api/saju 라우팅을 확인해주세요.");
          }

          if (!response.ok) throw new Error(data.message || "요청 실패");

          emptyMessage.classList.add("hidden");
          resultContent.classList.remove("hidden");
          document.getElementById("profile-line").textContent = data.profile.name + " / " + (data.profile.gender === "male" ? "남성" : "여성");
          document.getElementById("calendar-line").textContent = "입력 기준: " + (data.profile.calendarType === "solar" ? "양력" : "음력") + " | 양력 변환: " + data.saju.solarDateTime;
          document.getElementById("provider-line").textContent = data.aiProvider === "claude" ? "AI 해석: Claude" : "AI 해석: 기본 모드";
          document.getElementById("year-pillar").textContent = data.saju.yearPillar;
          document.getElementById("month-pillar").textContent = data.saju.monthPillar;
          document.getElementById("day-pillar").textContent = data.saju.dayPillar;
          document.getElementById("time-pillar").textContent = data.saju.timePillar;
          document.getElementById("eight-char").textContent = data.saju.eightChar;
          document.getElementById("ai-fortune").textContent = data.aiFortune;
        } catch (error) {
          alert(error.message);
        } finally {
          setLoading(false);
          if (window.lucide) window.lucide.createIcons();
        }
      });

      if (window.lucide) {
        window.lucide.createIcons();
      }
    </script>
  </body>
</html>
