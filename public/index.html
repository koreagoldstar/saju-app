<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saju Insight</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto w-full max-w-6xl px-4 py-10 md:px-8">
      <section class="rounded-3xl border border-violet-500/30 bg-gradient-to-br from-violet-900/30 to-slate-900 p-8 shadow-2xl shadow-violet-900/20">
        <p class="text-sm uppercase tracking-[0.2em] text-violet-300">Saju Insight</p>
        <h1 class="mt-2 text-3xl font-bold md:text-4xl">사주 만세력 & AI 운세 리포트</h1>
        <p class="mt-3 text-slate-300">정보를 입력하면 사주 8자와 해석을 확인할 수 있습니다.</p>
      </section>

      <section class="mt-6 grid gap-6 lg:grid-cols-2">
        <div class="rounded-3xl border border-slate-700 bg-slate-900/70 p-6">
          <h2 class="text-xl font-semibold">입력 폼</h2>
          <form id="saju-form" class="mt-5 space-y-4">
            <div>
              <label class="mb-1 block text-sm text-slate-300">이름</label>
              <input name="name" required class="w-full rounded-xl border border-slate-600 bg-slate-800 px-4 py-3 outline-none focus:border-violet-400" />
            </div>
            <div>
              <label class="mb-1 block text-sm text-slate-300">생년월일</label>
              <input type="date" name="birthDate" required class="w-full rounded-xl border border-slate-600 bg-slate-800 px-4 py-3 outline-none focus:border-violet-400" />
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="mb-1 block text-sm text-slate-300">태어난 시</label>
                <input type="number" name="birthHour" min="0" max="23" required class="w-full rounded-xl border border-slate-600 bg-slate-800 px-4 py-3 outline-none focus:border-violet-400" />
              </div>
              <div>
                <label class="mb-1 block text-sm text-slate-300">태어난 분</label>
                <input type="number" name="birthMinute" min="0" max="59" required class="w-full rounded-xl border border-slate-600 bg-slate-800 px-4 py-3 outline-none focus:border-violet-400" />
              </div>
            </div>
            <div>
              <label class="mb-1 block text-sm text-slate-300">성별</label>
              <select name="gender" required class="w-full rounded-xl border border-slate-600 bg-slate-800 px-4 py-3 outline-none focus:border-violet-400">
                <option value="">선택</option>
                <option value="male">남성</option>
                <option value="female">여성</option>
              </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <label class="flex items-center gap-2 rounded-xl border border-slate-600 bg-slate-800 px-4 py-3">
                <input type="radio" name="calendarType" value="solar" checked />
                <span>양력</span>
              </label>
              <label class="flex items-center gap-2 rounded-xl border border-slate-600 bg-slate-800 px-4 py-3">
                <input type="radio" name="calendarType" value="lunar" />
                <span>음력</span>
              </label>
            </div>
            <button id="submit-btn" type="submit" class="w-full rounded-xl bg-violet-500 px-4 py-3 font-semibold text-white hover:bg-violet-400 disabled:cursor-not-allowed disabled:bg-violet-700">
              사주 결과 보기
            </button>
            <p id="loading-text" class="hidden text-sm text-violet-300">해석 중입니다... 잠시만 기다려주세요.</p>
          </form>
        </div>

        <div class="rounded-3xl border border-slate-700 bg-slate-900/70 p-6">
          <h2 class="text-xl font-semibold">결과</h2>
          <p id="empty-message" class="mt-5 text-slate-300">입력 후 결과가 여기에 표시됩니다.</p>
          <div id="result-content" class="mt-5 hidden space-y-4">
            <p id="profile-line" class="text-sm text-slate-300"></p>
            <p id="calendar-line" class="text-sm text-slate-300"></p>
            <p id="provider-line" class="text-xs text-slate-400"></p>
            <div class="grid grid-cols-2 gap-3">
              <div class="rounded-2xl bg-violet-500/20 p-4"><p class="text-xs">연주</p><p id="year-pillar" class="text-2xl font-bold"></p></div>
              <div class="rounded-2xl bg-indigo-500/20 p-4"><p class="text-xs">월주</p><p id="month-pillar" class="text-2xl font-bold"></p></div>
              <div class="rounded-2xl bg-cyan-500/20 p-4"><p class="text-xs">일주</p><p id="day-pillar" class="text-2xl font-bold"></p></div>
              <div class="rounded-2xl bg-emerald-500/20 p-4"><p class="text-xs">시주</p><p id="time-pillar" class="text-2xl font-bold"></p></div>
            </div>
            <div class="rounded-2xl border border-violet-400/40 bg-violet-500/10 p-4">
              <p class="text-xs text-violet-200">사주 8자</p>
              <p id="eight-char" class="mt-1 text-lg font-semibold"></p>
            </div>
            <div class="rounded-2xl border border-amber-400/30 bg-amber-500/10 p-4">
              <p class="text-xs text-amber-200">AI 운세 풀이</p>
              <p id="ai-fortune" class="mt-2 leading-7"></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("saju-form");
      const emptyMessage = document.getElementById("empty-message");
      const resultContent = document.getElementById("result-content");
      const submitBtn = document.getElementById("submit-btn");
      const loadingText = document.getElementById("loading-text");

      function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        submitBtn.textContent = isLoading ? "해석 중..." : "사주 결과 보기";
        loadingText.classList.toggle("hidden", !isLoading);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(form);
        const payload = {
          name: formData.get("name"),
          birthDate: formData.get("birthDate"),
          birthHour: Number(formData.get("birthHour")),
          birthMinute: Number(formData.get("birthMinute")),
          gender: formData.get("gender"),
          calendarType: formData.get("calendarType"),
        };

        try {
          setLoading(true);
          const response = await fetch("/api/saju", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const raw = await response.text();
          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            throw new Error("API 응답이 JSON 형식이 아닙니다. 배포 설정에서 /api/saju 라우팅을 확인해주세요.");
          }

          if (!response.ok) throw new Error(data.message || "요청 실패");

          emptyMessage.classList.add("hidden");
          resultContent.classList.remove("hidden");
          document.getElementById("profile-line").textContent = data.profile.name + " / " + (data.profile.gender === "male" ? "남성" : "여성");
          document.getElementById("calendar-line").textContent = "입력 기준: " + (data.profile.calendarType === "solar" ? "양력" : "음력") + " | 양력 변환: " + data.saju.solarDateTime;
          document.getElementById("provider-line").textContent = data.aiProvider === "claude" ? "AI 해석: Claude" : "AI 해석: 기본 모드";
          document.getElementById("year-pillar").textContent = data.saju.yearPillar;
          document.getElementById("month-pillar").textContent = data.saju.monthPillar;
          document.getElementById("day-pillar").textContent = data.saju.dayPillar;
          document.getElementById("time-pillar").textContent = data.saju.timePillar;
          document.getElementById("eight-char").textContent = data.saju.eightChar;
          document.getElementById("ai-fortune").textContent = data.aiFortune;
        } catch (error) {
          alert(error.message);
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
