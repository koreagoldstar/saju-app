<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 운세</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 via-sky-50 to-violet-50 text-slate-800">
  <main class="mx-auto max-w-6xl px-4 py-8 md:px-8">
    <section class="overflow-hidden rounded-3xl border border-white/80 bg-white/70 shadow-xl backdrop-blur">
      <div class="h-56 bg-[url('https://images.unsplash.com/photo-1513151233558-d860c5398176?auto=format&fit=crop&w=1500&q=80')] bg-cover bg-center md:h-72">
        <div class="flex h-full flex-col justify-end bg-gradient-to-t from-white/90 to-white/20 p-6">
          <p class="inline-flex w-fit items-center gap-2 rounded-full bg-white/80 px-3 py-1 text-sm font-semibold text-indigo-700"><i data-lucide="sun-medium" class="h-4 w-4"></i>오늘의 운세</p>
          <h1 class="mt-3 text-3xl font-bold md:text-4xl">카테고리별 맞춤 해석</h1>
          <p class="mt-1 text-slate-700">연애운, 사업운, 귀인운, 직장운, 재물운을 탭으로 선택해 확인하세요.</p>
        </div>
      </div>
    </section>

    <section class="mt-6 grid gap-6 lg:grid-cols-2">
      <div class="rounded-3xl border border-white/80 bg-white/75 p-6 shadow-lg backdrop-blur">
        <form id="saju-form" class="space-y-4">
          <input name="name" required placeholder="이름" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3" />
          <input type="date" name="birthDate" required class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3" />
          <div class="grid grid-cols-2 gap-3">
            <input type="number" name="birthHour" min="0" max="23" required placeholder="시" class="rounded-xl border border-slate-200 bg-white px-4 py-3" />
            <input type="number" name="birthMinute" min="0" max="59" required placeholder="분" class="rounded-xl border border-slate-200 bg-white px-4 py-3" />
          </div>
          <div class="grid grid-cols-2 gap-3">
            <select name="gender" required class="rounded-xl border border-slate-200 bg-white px-4 py-3"><option value="">성별</option><option value="male">남성</option><option value="female">여성</option></select>
            <select name="calendarType" required class="rounded-xl border border-slate-200 bg-white px-4 py-3"><option value="solar">양력</option><option value="lunar">음력</option></select>
          </div>

          <div class="grid grid-cols-2 gap-2 sm:grid-cols-3" id="tabs">
            <button type="button" data-category="love" class="tab rounded-xl bg-indigo-500 px-3 py-2 text-sm font-semibold text-white">연애운</button>
            <button type="button" data-category="business" class="tab rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold">사업운</button>
            <button type="button" data-category="benefactor" class="tab rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold">귀인운</button>
            <button type="button" data-category="career" class="tab rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold">직장운</button>
            <button type="button" data-category="wealth" class="tab rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold">재물운</button>
          </div>

          <button id="submit-btn" type="submit" class="w-full rounded-xl bg-indigo-500 px-4 py-3 font-semibold text-white hover:bg-indigo-600">오늘의 운세 보기</button>
        </form>
      </div>

      <div class="rounded-3xl border border-white/80 bg-white/75 p-6 shadow-lg backdrop-blur">
        <p id="loading" class="hidden rounded-xl bg-indigo-50 p-3 text-sm text-indigo-700">해석 중... 잠시만 기다려주세요.</p>
        <p id="empty-message" class="text-slate-600">왼쪽 정보를 입력하면 결과가 표시됩니다.</p>
        <div id="result-content" class="hidden space-y-3">
          <p id="category-line" class="text-sm font-semibold text-indigo-700"></p>
          <p id="profile-line" class="text-sm text-slate-600"></p>
          <p id="calendar-line" class="text-sm text-slate-600"></p>
          <div class="grid grid-cols-2 gap-3">
            <div class="rounded-xl bg-white p-3"><p class="text-xs text-slate-500">연주</p><p id="year-pillar" class="text-xl font-bold"></p></div>
            <div class="rounded-xl bg-white p-3"><p class="text-xs text-slate-500">월주</p><p id="month-pillar" class="text-xl font-bold"></p></div>
            <div class="rounded-xl bg-white p-3"><p class="text-xs text-slate-500">일주</p><p id="day-pillar" class="text-xl font-bold"></p></div>
            <div class="rounded-xl bg-white p-3"><p class="text-xs text-slate-500">시주</p><p id="time-pillar" class="text-xl font-bold"></p></div>
          </div>
          <div class="rounded-xl bg-white p-4"><p class="text-xs text-slate-500">사주 8자</p><p id="eight-char" class="mt-1 text-lg font-semibold"></p></div>
          <div class="rounded-xl bg-indigo-50 p-4"><p class="text-xs text-indigo-600">카테고리 해석</p><p id="ai-fortune" class="mt-2 whitespace-pre-line leading-7 text-slate-700"></p></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById("saju-form");
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const submitBtn = document.getElementById("submit-btn");
    const loading = document.getElementById("loading");
    const emptyMessage = document.getElementById("empty-message");
    const resultContent = document.getElementById("result-content");
    let selectedCategory = "love";

    function renderTabs() {
      tabs.forEach((tab) => {
        const active = tab.dataset.category === selectedCategory;
        tab.className = active
          ? "tab rounded-xl bg-indigo-500 px-3 py-2 text-sm font-semibold text-white"
          : "tab rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold";
      });
    }

    tabs.forEach((tab) => tab.addEventListener("click", () => { selectedCategory = tab.dataset.category; renderTabs(); }));

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(form);
      const payload = {
        name: f.get("name"),
        birthDate: f.get("birthDate"),
        birthHour: Number(f.get("birthHour")),
        birthMinute: Number(f.get("birthMinute")),
        gender: f.get("gender"),
        calendarType: f.get("calendarType"),
        category: selectedCategory,
      };

      try {
        submitBtn.disabled = true;
        loading.classList.remove("hidden");

        const response = await fetch("/api/saju", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || "운세 조회 실패");

        emptyMessage.classList.add("hidden");
        resultContent.classList.remove("hidden");

        document.getElementById("category-line").textContent = "선택 카테고리: " + data.categoryLabel;
        document.getElementById("profile-line").textContent = data.profile.name + " / " + (data.profile.gender === "male" ? "남성" : "여성");
        document.getElementById("calendar-line").textContent = "달력: " + (data.profile.calendarType === "solar" ? "양력" : "음력") + " | 양력 기준: " + data.saju.solarDateTime;
        document.getElementById("year-pillar").textContent = data.saju.yearPillar;
        document.getElementById("month-pillar").textContent = data.saju.monthPillar;
        document.getElementById("day-pillar").textContent = data.saju.dayPillar;
        document.getElementById("time-pillar").textContent = data.saju.timePillar;
        document.getElementById("eight-char").textContent = data.saju.eightChar;
        document.getElementById("ai-fortune").textContent = data.aiFortune;
      } catch (error) {
        alert(error.message);
      } finally {
        submitBtn.disabled = false;
        loading.classList.add("hidden");
        if (window.lucide) window.lucide.createIcons();
      }
    });

    if (window.lucide) window.lucide.createIcons();
  </script>
</body>
</html>
