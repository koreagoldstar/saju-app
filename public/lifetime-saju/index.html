<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>평생 사주</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background:
        radial-gradient(circle at 15% 10%, rgba(215, 178, 109, 0.2), transparent 36%),
        radial-gradient(circle at 84% 82%, rgba(100, 116, 139, 0.2), transparent 34%),
        #020617;
    }
    .parallax-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(460px circle at var(--mx, 50%) var(--my, 50%), rgba(250, 204, 21, 0.16), transparent 65%),
        radial-gradient(340px circle at calc(var(--mx, 50%) + 8%) calc(var(--my, 50%) + 10%), rgba(59, 130, 246, 0.11), transparent 70%);
      transition: background-position 0.08s linear;
    }
    .spark::before,
    .spark::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 18% 26%, rgba(250, 204, 21, 0.65), transparent 60%),
        radial-gradient(2px 2px at 73% 14%, rgba(250, 204, 21, 0.5), transparent 60%),
        radial-gradient(1.6px 1.6px at 61% 78%, rgba(255, 255, 255, 0.5), transparent 60%),
        radial-gradient(1.8px 1.8px at 36% 64%, rgba(250, 204, 21, 0.55), transparent 60%);
      animation: twinkle 7s ease-in-out infinite alternate;
    }
    .spark::after { animation-duration: 11s; opacity: 0.65; }
    .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .55s ease, transform .55s ease;
    }
    .reveal.in { opacity: 1; transform: translateY(0); }
    .flow-track {
      position: relative;
      overflow: hidden;
      border-radius: 9999px;
      height: 10px;
      background: rgba(100, 116, 139, 0.25);
      border: 1px solid rgba(250, 204, 21, 0.25);
    }
    .flow-track::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 42%;
      background: linear-gradient(90deg, rgba(250, 204, 21, 0.2), rgba(250, 204, 21, 0.85), rgba(250, 204, 21, 0.2));
      animation: flowMove 2.8s linear infinite;
    }
    .timeline-item {
      border: 1px solid rgba(250, 204, 21, 0.25);
      background: rgba(2, 6, 23, 0.6);
      border-radius: 12px;
      padding: 10px;
    }
    .timeline-item.current {
      border-color: rgba(250, 204, 21, 0.9);
      box-shadow: 0 0 0 1px rgba(250, 204, 21, 0.28), 0 10px 24px rgba(250, 204, 21, 0.14);
      background: rgba(120, 53, 15, 0.18);
    }
    .summary-card {
      border: 1px solid rgba(250, 204, 21, 0.28);
      border-radius: 12px;
      background: rgba(2, 6, 23, 0.62);
      padding: 10px;
    }
    .report-section {
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 12px;
      background: rgba(2, 6, 23, 0.52);
      overflow: hidden;
    }
    .report-toggle {
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      color: #fde68a;
      background: rgba(15, 23, 42, 0.72);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }
    .report-toggle .arrow {
      transition: transform .2s ease;
    }
    .report-section[data-open="false"] .arrow {
      transform: rotate(-90deg);
    }
    .report-body {
      padding: 10px 12px;
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.65;
      color: #d6d3d1;
      max-height: 360px;
      overflow: auto;
    }
    .report-section[data-open="false"] .report-body {
      display: none;
    }
    .current-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 9999px;
      border: 1px solid rgba(250, 204, 21, 0.7);
      background: rgba(250, 204, 21, 0.2);
      color: #fde68a;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
    }
    @keyframes twinkle { from { opacity: .35; } to { opacity: .9; } }
    @keyframes flowMove {
      from { transform: translateX(-130%); }
      to { transform: translateX(260%); }
    }
  </style>
</head>
<body class="spark min-h-screen text-slate-100">
  <div class="parallax-glow"></div>
  <main class="mx-auto max-w-5xl px-4 py-8">
    <a href="/" class="text-sm text-amber-300 underline">메인으로</a>
    <section class="reveal mt-3 overflow-hidden rounded-3xl border border-amber-300/30 bg-gradient-to-br from-slate-900 to-slate-950 p-6">
      <div class="grid gap-5 md:grid-cols-[120px_1fr] md:items-center">
        <img src="/assets/images/icon-lifetime-saju.png" alt="평생 사주" class="h-28 w-28 rounded-2xl border border-amber-300/40 object-cover" />
        <div>
          <p class="text-xs uppercase tracking-[0.2em] text-amber-200">Premium Insight</p>
          <h1 class="mt-2 text-3xl font-bold text-stone-100">평생 사주 분석</h1>
          <p class="mt-2 text-sm leading-6 text-stone-300">타고난 기질과 인생 전환기 흐름을 장기 관점으로 정밀 해석하고, 시기별 변화 포인트를 지속적으로 점검할 수 있게 안내합니다.</p>
        </div>
      </div>
    </section>

    <section class="mt-6 grid gap-6 lg:grid-cols-2">
      <form id="form" class="reveal rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4 space-y-3">
        <p class="text-sm font-semibold text-amber-200">입력 폼</p>
        <input name="name" required placeholder="이름" class="w-full rounded-lg bg-slate-800 px-3 py-2" />
        <input type="date" name="birthDate" required class="w-full rounded-lg bg-slate-800 px-3 py-2" />
        <div class="grid grid-cols-2 gap-3">
          <input type="number" name="birthHour" min="0" max="23" required placeholder="시" class="rounded-lg bg-slate-800 px-3 py-2" />
          <input type="number" name="birthMinute" min="0" max="59" required placeholder="분" class="rounded-lg bg-slate-800 px-3 py-2" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <select name="gender" class="rounded-lg bg-slate-800 px-3 py-2"><option value="male">남성</option><option value="female">여성</option></select>
          <select name="calendarType" class="rounded-lg bg-slate-800 px-3 py-2"><option value="solar">양력</option><option value="lunar">음력</option></select>
        </div>
        <button class="w-full rounded-lg bg-gradient-to-r from-amber-500 to-yellow-300 px-4 py-2 font-semibold text-slate-900">평생 사주 리포트 생성</button>
      </form>

      <div class="reveal rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4">
        <p class="text-sm font-semibold text-amber-200">결과물</p>
        <p class="mt-2 text-xs leading-6 text-stone-300">
          평생 사주 분석은 한 번의 결론이 아니라, 시기와 환경 변화에 따라 해석 포인트가 이동하는 장기 리포트입니다.
          대운/세운 전환 구간마다 재확인하시면 실전 활용도가 높아집니다.
        </p>
        <div class="mt-3 grid grid-cols-2 gap-3 text-xs">
          <div class="rounded-lg bg-black/30 p-3"><p class="text-stone-400">연주</p><p id="year" class="mt-1 text-lg font-bold"></p></div>
          <div class="rounded-lg bg-black/30 p-3"><p class="text-stone-400">일주</p><p id="day" class="mt-1 text-lg font-bold"></p></div>
        </div>
        <div class="mt-3 rounded-lg bg-black/30 p-3">
          <p class="text-xs text-stone-400">지속적으로 변하는 운세 흐름</p>
          <div class="mt-2 flow-track"></div>
          <p id="longterm-note" class="mt-2 text-xs text-stone-300"></p>
          <p id="next-shift" class="mt-1 text-xs font-semibold text-amber-200"></p>
        </div>
        <div class="mt-3 rounded-lg bg-black/30 p-3">
          <p class="text-xs text-stone-400">장기 대운 타임라인 (핵심 구간)</p>
          <div id="timeline" class="mt-2 space-y-2"></div>
        </div>
        <div class="mt-3 rounded-lg bg-black/30 p-3">
          <p class="text-xs text-stone-400">핵심 요약</p>
          <div id="summary-cards" class="mt-2 grid gap-2 md:grid-cols-3"></div>
        </div>
        <div id="report-sections" class="mt-3 space-y-2"></div>
      </div>
    </section>
  </main>
  <script>
    const form = document.getElementById("form");
    const year = document.getElementById("year");
    const day = document.getElementById("day");
    const timeline = document.getElementById("timeline");
    const longtermNote = document.getElementById("longterm-note");
    const nextShift = document.getElementById("next-shift");
    const summaryCards = document.getElementById("summary-cards");
    const reportSections = document.getElementById("report-sections");
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add("in");
      });
    }, { threshold: 0.12 });
    document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
    window.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      document.body.style.setProperty("--mx", x + "%");
      document.body.style.setProperty("--my", y + "%");
    });

    function extractSections(reportText) {
      const lines = String(reportText || "").split("\n");
      const sectionTitles = ["인생 전반 흐름", "시기별 변화 포인트", "분야별 장기 운영 관점", "지속 점검 가이드"];
      const sections = [];
      let current = null;
      lines.forEach((line) => {
        if (sectionTitles.includes(line.trim())) {
          if (current) sections.push(current);
          current = { title: line.trim(), content: [] };
        } else if (current) {
          current.content.push(line);
        }
      });
      if (current) sections.push(current);
      return sections;
    }

    function renderSummaryCards(sections) {
      if (!summaryCards) return;
      const picks = sections.slice(0, 3).map((s) => (s.content || []).find((x) => x.trim()) || "요약 데이터 없음");
      summaryCards.innerHTML = picks
        .map((text, idx) =>
          '<div class="summary-card">' +
          '<p class="text-[11px] text-amber-200">요약 ' + (idx + 1) + "</p>" +
          '<p class="mt-1 text-xs leading-6 text-stone-200">' + text + "</p>" +
          "</div>"
        )
        .join("");
    }

    function renderCollapsibleSections(sections) {
      if (!reportSections) return;
      reportSections.innerHTML = sections
        .map((section, idx) =>
          '<div class="report-section" data-open="' + (idx === 0 ? "true" : "false") + '">' +
          '<button type="button" class="report-toggle">' +
          '<span>' + section.title + "</span>" +
          '<span class="arrow">▾</span>' +
          "</button>" +
          '<div class="report-body">' + section.content.join("\n") + "</div>" +
          "</div>"
        )
        .join("");

      reportSections.querySelectorAll(".report-toggle").forEach((btn) => {
        btn.addEventListener("click", () => {
          const container = btn.closest(".report-section");
          const isOpen = container.getAttribute("data-open") === "true";
          container.setAttribute("data-open", isOpen ? "false" : "true");
        });
      });
    }
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(form);
      const payload = {
        name: f.get("name"),
        birthDate: f.get("birthDate"),
        birthHour: Number(f.get("birthHour")),
        birthMinute: Number(f.get("birthMinute")),
        gender: f.get("gender"),
        calendarType: f.get("calendarType")
      };
      const res = await fetch("/api/premium-lifetime", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) return alert(data.message || "요청 실패");
      year.textContent = data.saju.yearPillar;
      day.textContent = data.saju.dayPillar;
      const currentDaYun = data.saju.luckCycle && data.saju.luckCycle.currentDaYun;
      const currentYear = data.saju.luckCycle && data.saju.luckCycle.currentYear;
      longtermNote.textContent = currentDaYun
        ? "현재는 " + currentDaYun.ganZhi + " (" + currentDaYun.startYear + "~" + currentDaYun.endYear + ") 구간입니다. 다음 전환점 전에 전략을 점검해 주세요."
        : "현재 대운 정보 계산 중입니다. 분기 단위로 재확인하며 흐름을 업데이트해 주세요.";
      if (currentDaYun && Number.isFinite(currentYear)) {
        const yearsLeft = Math.max(0, currentDaYun.endYear - currentYear);
        const nextStart = currentDaYun.endYear + 1;
        nextShift.textContent = "다음 전환까지 약 " + yearsLeft + "년 · 다음 대운 시작 예상: " + nextStart + "년";
      } else {
        nextShift.textContent = "다음 전환 시점은 입력 후 자동 계산됩니다.";
      }
      const timelineItems = ((data.saju.luckCycle && data.saju.luckCycle.daYunList) || []).slice(0, 6);
      timeline.innerHTML = timelineItems
        .map((item) => {
          const isCurrent = currentDaYun && item.startYear === currentDaYun.startYear && item.endYear === currentDaYun.endYear;
          return '<div class="timeline-item ' + (isCurrent ? "current" : "") + '">' +
          '<div class="flex items-center justify-between gap-2">' +
          '<p class="text-xs font-semibold text-amber-200">' + (item.ganZhi || "-") + "</p>" +
          (isCurrent ? '<span class="current-badge">현재 구간</span>' : "") +
          "</div>" +
          '<p class="mt-1 text-xs text-stone-300">' + item.startYear + "~" + item.endYear + " · 나이 " + item.startAge + "~" + item.endAge + "</p>" +
          "</div>";
        })
        .join("");
      const sections = extractSections(data.report);
      renderSummaryCards(sections);
      renderCollapsibleSections(sections);
    });
  </script>
</body>
</html>
