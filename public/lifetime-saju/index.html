<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>평생 사주</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background:
        radial-gradient(circle at 15% 10%, rgba(215, 178, 109, 0.2), transparent 36%),
        radial-gradient(circle at 84% 82%, rgba(100, 116, 139, 0.2), transparent 34%),
        #020617;
    }
    .parallax-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(460px circle at var(--mx, 50%) var(--my, 50%), rgba(250, 204, 21, 0.16), transparent 65%),
        radial-gradient(340px circle at calc(var(--mx, 50%) + 8%) calc(var(--my, 50%) + 10%), rgba(59, 130, 246, 0.11), transparent 70%);
      transition: background-position 0.08s linear;
    }
    .spark::before,
    .spark::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 18% 26%, rgba(250, 204, 21, 0.65), transparent 60%),
        radial-gradient(2px 2px at 73% 14%, rgba(250, 204, 21, 0.5), transparent 60%),
        radial-gradient(1.6px 1.6px at 61% 78%, rgba(255, 255, 255, 0.5), transparent 60%),
        radial-gradient(1.8px 1.8px at 36% 64%, rgba(250, 204, 21, 0.55), transparent 60%);
      animation: twinkle 7s ease-in-out infinite alternate;
    }
    .spark::after { animation-duration: 11s; opacity: 0.65; }
    .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .55s ease, transform .55s ease;
    }
    .reveal.in { opacity: 1; transform: translateY(0); }
    @keyframes twinkle { from { opacity: .35; } to { opacity: .9; } }
  </style>
</head>
<body class="spark min-h-screen text-slate-100">
  <div class="parallax-glow"></div>
  <main class="mx-auto max-w-5xl px-4 py-8">
    <a href="/" class="text-sm text-amber-300 underline">메인으로</a>
    <section class="reveal mt-3 overflow-hidden rounded-3xl border border-amber-300/30 bg-gradient-to-br from-slate-900 to-slate-950 p-6">
      <div class="grid gap-5 md:grid-cols-[120px_1fr] md:items-center">
        <img src="/assets/images/icon-lifetime-saju.png" alt="평생 사주" class="h-28 w-28 rounded-2xl border border-amber-300/40 object-cover" />
        <div>
          <p class="text-xs uppercase tracking-[0.2em] text-amber-200">Premium Insight</p>
          <h1 class="mt-2 text-3xl font-bold text-stone-100">평생 사주 분석</h1>
          <p class="mt-2 text-sm leading-6 text-stone-300">타고난 기질, 직업 성향, 인생 전환기 흐름을 장기 관점으로 정밀 해석합니다.</p>
        </div>
      </div>
    </section>

    <section class="mt-6 grid gap-6 lg:grid-cols-2">
      <form id="form" class="reveal rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4 space-y-3">
        <p class="text-sm font-semibold text-amber-200">입력 폼</p>
        <input name="name" required placeholder="이름" class="w-full rounded-lg bg-slate-800 px-3 py-2" />
        <input type="date" name="birthDate" required class="w-full rounded-lg bg-slate-800 px-3 py-2" />
        <div class="grid grid-cols-2 gap-3">
          <input type="number" name="birthHour" min="0" max="23" required placeholder="시" class="rounded-lg bg-slate-800 px-3 py-2" />
          <input type="number" name="birthMinute" min="0" max="59" required placeholder="분" class="rounded-lg bg-slate-800 px-3 py-2" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <select name="gender" class="rounded-lg bg-slate-800 px-3 py-2"><option value="male">남성</option><option value="female">여성</option></select>
          <select name="calendarType" class="rounded-lg bg-slate-800 px-3 py-2"><option value="solar">양력</option><option value="lunar">음력</option></select>
        </div>
        <button class="w-full rounded-lg bg-gradient-to-r from-amber-500 to-yellow-300 px-4 py-2 font-semibold text-slate-900">평생 사주 리포트 생성</button>
      </form>

      <div class="reveal rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4">
        <p class="text-sm font-semibold text-amber-200">결과물</p>
        <div class="mt-3 grid grid-cols-2 gap-3 text-xs">
          <div class="rounded-lg bg-black/30 p-3"><p class="text-stone-400">연주</p><p id="year" class="mt-1 text-lg font-bold"></p></div>
          <div class="rounded-lg bg-black/30 p-3"><p class="text-stone-400">일주</p><p id="day" class="mt-1 text-lg font-bold"></p></div>
        </div>
        <pre id="result" class="mt-3 max-h-[360px] overflow-auto rounded-lg bg-black/30 p-3 text-xs whitespace-pre-wrap"></pre>
      </div>
    </section>
  </main>
  <script>
    const form = document.getElementById("form");
    const result = document.getElementById("result");
    const year = document.getElementById("year");
    const day = document.getElementById("day");
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add("in");
      });
    }, { threshold: 0.12 });
    document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
    window.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      document.body.style.setProperty("--mx", x + "%");
      document.body.style.setProperty("--my", y + "%");
    });
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(form);
      const payload = {
        name: f.get("name"),
        birthDate: f.get("birthDate"),
        birthHour: Number(f.get("birthHour")),
        birthMinute: Number(f.get("birthMinute")),
        gender: f.get("gender"),
        calendarType: f.get("calendarType"),
        category: "career",
        tone: "expert"
      };
      const res = await fetch("/api/saju", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) return alert(data.message || "요청 실패");
      year.textContent = data.saju.yearPillar;
      day.textContent = data.saju.dayPillar;
      result.textContent = data.aiFortune;
    });
  </script>
</body>
</html>
