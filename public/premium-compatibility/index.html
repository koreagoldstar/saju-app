<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프리미엄 궁합</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background:
        radial-gradient(circle at 10% 16%, rgba(217, 119, 6, 0.2), transparent 34%),
        radial-gradient(circle at 84% 84%, rgba(147, 51, 234, 0.18), transparent 38%),
        #020617;
    }
    .parallax-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(460px circle at var(--mx, 50%) var(--my, 50%), rgba(250, 204, 21, 0.16), transparent 65%),
        radial-gradient(340px circle at calc(var(--mx, 50%) + 9%) calc(var(--my, 50%) + 6%), rgba(236, 72, 153, 0.11), transparent 70%);
    }
    .spark::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 16% 20%, rgba(250, 204, 21, .6), transparent 60%),
        radial-gradient(2px 2px at 75% 30%, rgba(250, 204, 21, .55), transparent 60%),
        radial-gradient(2px 2px at 58% 70%, rgba(255,255,255,.5), transparent 60%),
        radial-gradient(2px 2px at 30% 78%, rgba(250, 204, 21, .55), transparent 60%);
      animation: twinkle 9s ease-in-out infinite alternate;
    }
    .reveal { opacity: 0; transform: translateY(16px); transition: all .55s ease; }
    .reveal.in { opacity: 1; transform: translateY(0); }
    .person-card {
      border: 1px solid rgba(250, 204, 21, 0.25);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.88), rgba(2, 6, 23, 0.8));
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }
    .cute-dot {
      width: 8px;
      height: 8px;
      border-radius: 9999px;
      display: inline-block;
      margin-right: 6px;
      background: linear-gradient(135deg, #f59e0b, #fcd34d);
      box-shadow: 0 0 12px rgba(250, 204, 21, 0.6);
    }
    .input-chip {
      font-size: 11px;
      color: #fde68a;
      background: rgba(120, 53, 15, 0.25);
      border: 1px solid rgba(250, 204, 21, 0.3);
      border-radius: 9999px;
      padding: 2px 8px;
    }
    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 9999px;
      border: 1px solid rgba(250, 204, 21, 0.45);
      background: linear-gradient(135deg, rgba(120, 53, 15, 0.45), rgba(30, 41, 59, 0.55));
      color: #fde68a;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 12px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
    }
    .home-link .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 9999px;
      border: 1px solid rgba(250, 204, 21, 0.55);
      background: rgba(250, 204, 21, 0.2);
      font-size: 12px;
      line-height: 1;
    }
    @keyframes twinkle { from { opacity: .35; } to { opacity: .95; } }
  </style>
</head>
<body class="spark min-h-screen text-slate-100">
  <div class="parallax-glow"></div>
  <main class="mx-auto max-w-6xl px-4 py-8">
    <a href="/" class="home-link"><span class="icon">💖</span><span>메인으로</span></a>
    <section class="reveal mt-3 overflow-hidden rounded-3xl border border-amber-300/30 bg-gradient-to-br from-slate-900 to-slate-950 p-6">
      <div class="grid gap-5 md:grid-cols-[120px_1fr] md:items-center">
        <img src="/assets/images/icon-premium-compatibility.png" alt="프리미엄 궁합" class="h-28 w-28 rounded-2xl border border-amber-300/40 object-cover" />
        <div>
          <p class="text-xs uppercase tracking-[0.2em] text-amber-200">Relationship Premium</p>
          <h1 class="mt-2 text-3xl font-bold text-stone-100">프리미엄 궁합 분석</h1>
          <p class="mt-2 text-sm leading-6 text-stone-300">두 사람의 오행 균형과 충돌 요소를 분석해 관계 운용 전략을 제시합니다.</p>
        </div>
      </div>
    </section>

    <section class="mt-6 grid gap-6 lg:grid-cols-2">
      <form id="form" class="reveal rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4 space-y-3">
        <div class="flex items-center justify-between gap-2">
          <p class="text-sm font-semibold text-amber-200">정보를 넣어주세요</p>
          <span class="input-chip">두 사람의 흐름을 분리 입력</span>
        </div>
        <div class="grid gap-3 md:grid-cols-2">
          <section class="person-card">
            <p class="mb-2 text-sm font-semibold text-amber-100"><span class="cute-dot"></span>내 정보</p>
            <div class="grid gap-2">
              <input name="meName" required placeholder="내 이름" class="rounded-lg bg-slate-800 px-3 py-2" />
              <input type="date" name="meBirthDate" required class="rounded-lg bg-slate-800 px-3 py-2" />
              <div class="grid grid-cols-2 gap-2">
                <input type="number" name="meHour" min="0" max="23" required placeholder="시" class="rounded-lg bg-slate-800 px-3 py-2" />
                <input type="number" name="meMinute" min="0" max="59" required placeholder="분" class="rounded-lg bg-slate-800 px-3 py-2" />
              </div>
              <div class="grid grid-cols-2 gap-2">
                <select name="meGender" class="rounded-lg bg-slate-800 px-3 py-2"><option value="male">남성</option><option value="female">여성</option></select>
                <select name="meCalendarType" class="rounded-lg bg-slate-800 px-3 py-2"><option value="solar">양력</option><option value="lunar">음력</option></select>
              </div>
            </div>
          </section>
          <section class="person-card">
            <p class="mb-2 text-sm font-semibold text-pink-200"><span class="cute-dot"></span>상대 정보</p>
            <div class="grid gap-2">
              <input name="partnerName" required placeholder="상대 이름" class="rounded-lg bg-slate-800 px-3 py-2" />
              <input type="date" name="partnerBirthDate" required class="rounded-lg bg-slate-800 px-3 py-2" />
              <div class="grid grid-cols-2 gap-2">
                <input type="number" name="partnerHour" min="0" max="23" required placeholder="시" class="rounded-lg bg-slate-800 px-3 py-2" />
                <input type="number" name="partnerMinute" min="0" max="59" required placeholder="분" class="rounded-lg bg-slate-800 px-3 py-2" />
              </div>
              <div class="grid grid-cols-2 gap-2">
                <select name="partnerGender" class="rounded-lg bg-slate-800 px-3 py-2"><option value="male">남성</option><option value="female">여성</option></select>
                <select name="partnerCalendarType" class="rounded-lg bg-slate-800 px-3 py-2"><option value="solar">양력</option><option value="lunar">음력</option></select>
              </div>
            </div>
          </section>
        </div>
        <select name="relationType" class="w-full rounded-lg bg-slate-800 px-3 py-2">
          <option value="dating">관계 모드: 연애</option>
          <option value="married">관계 모드: 부부</option>
          <option value="some">관계 모드: 썸</option>
          <option value="reunion">관계 모드: 재회</option>
        </select>
        <button class="w-full rounded-lg bg-gradient-to-r from-amber-500 to-yellow-300 px-4 py-2 font-semibold text-slate-900">프리미엄 궁합 보기</button>
      </form>

      <div class="reveal rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4">
        <p class="text-sm font-semibold text-amber-200">결과물</p>
        <div class="mt-3 rounded-lg bg-black/30 p-4">
          <p class="text-xs text-stone-400">궁합 점수</p>
          <p id="score" class="mt-1 text-3xl font-bold text-amber-200">-</p>
        </div>
        <p id="summary" class="mt-3 rounded-lg bg-black/30 p-3 text-sm text-stone-200">입력 후 궁합 요약이 표시됩니다.</p>
        <div class="mt-3 rounded-lg bg-black/30 p-3">
          <p class="text-xs text-amber-200">개운법</p>
          <ul id="luck-tips" class="mt-2 space-y-1 text-xs text-stone-200"></ul>
        </div>
        <pre id="result" class="mt-3 max-h-[320px] overflow-auto rounded-lg bg-black/30 p-3 text-xs whitespace-pre-wrap"></pre>
      </div>
    </section>
  </main>
  <script>
    const form = document.getElementById("form");
    const result = document.getElementById("result");
    const score = document.getElementById("score");
    const summary = document.getElementById("summary");
    const luckTips = document.getElementById("luck-tips");
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => entry.isIntersecting && entry.target.classList.add("in"));
    }, { threshold: 0.1 });
    document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
    window.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      document.body.style.setProperty("--mx", x + "%");
      document.body.style.setProperty("--my", y + "%");
    });
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(form);
      const [meYear, meMonth, meDay] = String(f.get("meBirthDate")).split("-").map(Number);
      const [partnerYear, partnerMonth, partnerDay] = String(f.get("partnerBirthDate")).split("-").map(Number);
      const payload = {
        meName: f.get("meName"), meYear, meMonth, meDay,
        meHour: Number(f.get("meHour")), meMinute: Number(f.get("meMinute")),
        meGender: f.get("meGender"), meCalendarType: f.get("meCalendarType"),
        partnerName: f.get("partnerName"), partnerYear, partnerMonth, partnerDay,
        partnerHour: Number(f.get("partnerHour")), partnerMinute: Number(f.get("partnerMinute")),
        partnerGender: f.get("partnerGender"), partnerCalendarType: f.get("partnerCalendarType"),
        relationType: f.get("relationType")
      };
      const res = await fetch("/api/compatibility", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) {
        score.textContent = "-";
        summary.textContent = data.message || "요청 실패";
        result.textContent = "입력값을 다시 확인해 주세요.";
        return;
      }
      score.textContent = data.score + "점";
      summary.textContent = data.summary;
      luckTips.innerHTML = (data.luckTips || []).map((x) => '<li>• ' + x + '</li>').join("");
      const elementDiffText = Object.entries(data.elementDiff || {})
        .map(([k, v]) => k + ": " + (v > 0 ? "+" : "") + v)
        .join(", ");
      const collisionsText = (data.collisions || []).length
        ? data.collisions.map((c) => c.element + "(" + (c.gap > 0 ? "+" : "") + c.gap + ")").join(", ")
        : "큰 충돌 요소 없음";
      const goodPhrases = (data.goodPhrases || []).length
        ? data.goodPhrases.map((x, i) => (i + 1) + ". " + x).join("\n")
        : "-";
      const avoidPhrases = (data.avoidPhrases || []).length
        ? data.avoidPhrases.map((x, i) => (i + 1) + ". " + x).join("\n")
        : "-";
      const luckTipText = (data.luckTips || []).length
        ? data.luckTips.map((x, i) => (i + 1) + ". " + x).join("\n")
        : "-";
      result.textContent =
        (data.relationTypeLabel || "관계") + " 모드 감성 궁합 해석\n" +
        (data.emotionalTone || "-") +
        "\n\n관계의 강점\n" +
        (data.resonancePoint || "-") +
        "\n\n주의 포인트\n" +
        (data.cautionPoint || "-") +
        "\n\n관계 회복 루틴\n" +
        (data.careRitual || "-") +
        "\n\n대화 가이드\n" +
        (data.conversationGuide || "-") +
        "\n\n상대가 듣기 좋은 말 3개\n" +
        goodPhrases +
        "\n\n피해야 할 말 3개\n" +
        avoidPhrases +
        "\n\n개운법\n" +
        luckTipText +
        "\n\n오행 편차\n" +
        elementDiffText +
        "\n\n충돌 요소\n" +
        collisionsText;
    });
  </script>
</body>
</html>
