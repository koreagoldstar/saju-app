<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사주 · 궁합</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-5xl px-4 py-8">
    <div class="mb-6 flex items-center justify-between">
      <h1 class="text-2xl font-bold">/saju - 만세력 & 궁합 분석</h1>
      <div class="space-x-2 text-sm">
        <a class="text-amber-300 underline" href="/dream">꿈해몽</a>
        <a class="text-amber-300 underline" href="/tarot">타로</a>
      </div>
    </div>

    <section class="rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4">
      <h2 class="text-lg font-semibold text-amber-200">개인 사주 리포트</h2>
      <form id="saju-form" class="mt-3 grid gap-3 md:grid-cols-3">
        <input name="name" required placeholder="이름" class="rounded-lg bg-slate-800 px-3 py-2" />
        <input type="date" name="birthDate" required class="rounded-lg bg-slate-800 px-3 py-2" />
        <select name="gender" required class="rounded-lg bg-slate-800 px-3 py-2"><option value="male">남성</option><option value="female">여성</option></select>
        <input type="number" name="birthHour" min="0" max="23" placeholder="시" required class="rounded-lg bg-slate-800 px-3 py-2" />
        <input type="number" name="birthMinute" min="0" max="59" placeholder="분" required class="rounded-lg bg-slate-800 px-3 py-2" />
        <select name="calendarType" class="rounded-lg bg-slate-800 px-3 py-2"><option value="solar">양력</option><option value="lunar">음력</option></select>
        <select name="category" class="rounded-lg bg-slate-800 px-3 py-2"><option value="love">연애운</option><option value="career">직장운</option><option value="wealth">재물운</option></select>
        <select name="tone" class="rounded-lg bg-slate-800 px-3 py-2"><option value="expert">전문가형</option><option value="comfort">상담형</option></select>
        <button class="rounded-lg bg-amber-400 px-3 py-2 font-semibold text-slate-900">리포트 생성</button>
      </form>
      <pre id="saju-result" class="mt-4 max-h-[min(80vh,720px)] overflow-auto whitespace-pre-wrap break-words rounded-lg bg-black/30 p-3 text-xs leading-relaxed"></pre>
    </section>

    <section class="mt-6 rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4">
      <h2 class="text-lg font-semibold text-amber-200">궁합 분석 (오행 충돌)</h2>
      <form id="compat-form" class="mt-3 grid gap-3 md:grid-cols-4">
        <input name="meName" required placeholder="내 이름" class="rounded-lg bg-slate-800 px-3 py-2" />
        <input type="date" name="meBirthDate" required class="rounded-lg bg-slate-800 px-3 py-2" />
        <input type="number" name="meHour" min="0" max="23" placeholder="내 시" required class="rounded-lg bg-slate-800 px-3 py-2" />
        <input type="number" name="meMinute" min="0" max="59" placeholder="내 분" required class="rounded-lg bg-slate-800 px-3 py-2" />
        <select name="meGender" class="rounded-lg bg-slate-800 px-3 py-2"><option value="male">내 성별: 남</option><option value="female">내 성별: 여</option></select>
        <select name="meCalendarType" class="rounded-lg bg-slate-800 px-3 py-2"><option value="solar">내 달력: 양력</option><option value="lunar">내 달력: 음력</option></select>
        <input name="partnerName" required placeholder="상대 이름" class="rounded-lg bg-slate-800 px-3 py-2" />
        <input type="date" name="partnerBirthDate" required class="rounded-lg bg-slate-800 px-3 py-2" />
        <input type="number" name="partnerHour" min="0" max="23" placeholder="상대 시" required class="rounded-lg bg-slate-800 px-3 py-2" />
        <input type="number" name="partnerMinute" min="0" max="59" placeholder="상대 분" required class="rounded-lg bg-slate-800 px-3 py-2" />
        <select name="partnerGender" class="rounded-lg bg-slate-800 px-3 py-2"><option value="male">상대 성별: 남</option><option value="female">상대 성별: 여</option></select>
        <select name="partnerCalendarType" class="rounded-lg bg-slate-800 px-3 py-2"><option value="solar">상대 달력: 양력</option><option value="lunar">상대 달력: 음력</option></select>
        <button class="rounded-lg bg-amber-400 px-3 py-2 font-semibold text-slate-900 md:col-span-2">궁합 분석 실행</button>
      </form>
      <pre id="compat-result" class="mt-4 max-h-[420px] overflow-auto rounded-lg bg-black/30 p-3 text-xs"></pre>
    </section>
  </main>

  <script>
    const sajuForm = document.getElementById("saju-form");
    const sajuResult = document.getElementById("saju-result");
    const compatForm = document.getElementById("compat-form");
    const compatResult = document.getElementById("compat-result");

    sajuForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(sajuForm);
      const payload = {
        name: f.get("name"),
        birthDate: f.get("birthDate"),
        birthHour: Number(f.get("birthHour")),
        birthMinute: Number(f.get("birthMinute")),
        gender: f.get("gender"),
        calendarType: f.get("calendarType"),
        category: f.get("category"),
        tone: f.get("tone")
      };
      const res = await fetch("/api/saju", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) {
        alert(data.message || "요청 실패");
        return;
      }
      sajuResult.textContent = JSON.stringify(data, null, 2);
    });

    compatForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(compatForm);
      const [meYear, meMonth, meDay] = String(f.get("meBirthDate")).split("-").map(Number);
      const [partnerYear, partnerMonth, partnerDay] = String(f.get("partnerBirthDate")).split("-").map(Number);
      const payload = {
        meName: f.get("meName"),
        meYear, meMonth, meDay,
        meHour: Number(f.get("meHour")),
        meMinute: Number(f.get("meMinute")),
        meGender: f.get("meGender"),
        meCalendarType: f.get("meCalendarType"),
        partnerName: f.get("partnerName"),
        partnerYear, partnerMonth, partnerDay,
        partnerHour: Number(f.get("partnerHour")),
        partnerMinute: Number(f.get("partnerMinute")),
        partnerGender: f.get("partnerGender"),
        partnerCalendarType: f.get("partnerCalendarType")
      };
      const res = await fetch("/api/compatibility", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) {
        alert(data.message || "요청 실패");
        return;
      }
      compatResult.textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
