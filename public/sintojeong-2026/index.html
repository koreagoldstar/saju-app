<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 신토정비결</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background:
        radial-gradient(circle at 12% 12%, rgba(215, 178, 109, 0.23), transparent 35%),
        radial-gradient(circle at 82% 84%, rgba(30, 41, 59, 0.45), transparent 40%),
        #020617;
    }
    .parallax-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(440px circle at var(--mx, 50%) var(--my, 50%), rgba(250, 204, 21, 0.16), transparent 65%),
        radial-gradient(320px circle at calc(var(--mx, 50%) + 7%) calc(var(--my, 50%) + 8%), rgba(99, 102, 241, 0.12), transparent 68%);
    }
    .spark::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 20% 22%, rgba(250, 204, 21, .7), transparent 60%),
        radial-gradient(2px 2px at 65% 32%, rgba(250, 204, 21, .55), transparent 60%),
        radial-gradient(2px 2px at 78% 72%, rgba(255,255,255,.5), transparent 60%),
        radial-gradient(2px 2px at 31% 74%, rgba(250, 204, 21, .55), transparent 60%);
      animation: twinkle 8s ease-in-out infinite alternate;
    }
    .reveal { opacity: 0; transform: translateY(16px); transition: all .55s ease; }
    .reveal.in { opacity: 1; transform: translateY(0); }
    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 9999px;
      border: 1px solid rgba(250, 204, 21, 0.45);
      background: linear-gradient(135deg, rgba(120, 53, 15, 0.45), rgba(30, 41, 59, 0.55));
      color: #fde68a;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 12px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
    }
    .home-link .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 9999px;
      border: 1px solid rgba(250, 204, 21, 0.55);
      background: rgba(250, 204, 21, 0.2);
      font-size: 12px;
      line-height: 1;
    }
    @keyframes twinkle { from { opacity: .35; } to { opacity: .95; } }
  </style>
</head>
<body class="spark min-h-screen text-slate-100">
  <div class="parallax-glow"></div>
  <main class="mx-auto max-w-5xl px-4 py-8">
    <a href="/" class="home-link"><span class="icon">📜</span><span>메인으로</span></a>
    <section class="reveal mt-3 overflow-hidden rounded-3xl border border-amber-300/30 bg-gradient-to-br from-slate-900 to-slate-950 p-6">
      <div class="grid gap-5 md:grid-cols-[120px_1fr] md:items-center">
        <img src="/assets/images/icon-2026-sintojeong.png" alt="2026 신토정비결" class="h-28 w-28 rounded-2xl border border-amber-300/40 object-cover" />
        <div>
          <p class="text-xs uppercase tracking-[0.2em] text-amber-200">Annual Premium</p>
          <h1 class="mt-2 text-3xl font-bold text-stone-100">2026 신토정비결</h1>
          <p class="mt-2 text-sm leading-6 text-stone-300">연간 변곡점, 분기별 전략, 실천 우선순위를 종합한 고급 리포트를 제공합니다.</p>
        </div>
      </div>
    </section>

    <section class="mt-6 grid gap-6 lg:grid-cols-2">
      <form id="form" class="reveal rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4 space-y-3">
        <p class="text-sm font-semibold text-amber-200">정보를 넣어주세요</p>
        <input name="name" required placeholder="이름" class="w-full rounded-lg bg-slate-800 px-3 py-2" />
        <input type="date" name="birthDate" required class="w-full rounded-lg bg-slate-800 px-3 py-2" />
        <div class="grid grid-cols-2 gap-3">
          <input type="number" name="birthHour" min="0" max="23" required placeholder="시" class="rounded-lg bg-slate-800 px-3 py-2" />
          <input type="number" name="birthMinute" min="0" max="59" required placeholder="분" class="rounded-lg bg-slate-800 px-3 py-2" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <select name="gender" class="rounded-lg bg-slate-800 px-3 py-2"><option value="male">남성</option><option value="female">여성</option></select>
          <select name="calendarType" class="rounded-lg bg-slate-800 px-3 py-2"><option value="solar">양력</option><option value="lunar">음력</option></select>
        </div>
        <button class="w-full rounded-lg bg-gradient-to-r from-amber-500 to-yellow-300 px-4 py-2 font-semibold text-slate-900">2026 리포트 생성</button>
      </form>

      <div class="reveal rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4">
        <p class="text-sm font-semibold text-amber-200">결과물</p>
        <p id="summary" class="mt-3 rounded-lg bg-black/30 p-3 text-sm text-stone-200">입력 후 연간 전략 리포트가 표시됩니다.</p>
        <div class="mt-3 rounded-lg bg-black/30 p-3">
          <p class="text-xs text-amber-200">개운법</p>
          <ul id="luck-tips" class="mt-2 space-y-1 text-xs text-stone-200"></ul>
        </div>
        <div class="mt-3 rounded-lg bg-black/30 p-3">
          <p class="text-xs text-stone-400">오행 분석 레이더</p>
          <canvas id="five-radar" class="mt-2" height="180"></canvas>
          <div class="mt-3 grid grid-cols-2 gap-2 text-[11px] text-stone-300">
            <p><span style="color:#22c55e">●</span> 목: 성장/확장</p>
            <p><span style="color:#ef4444">●</span> 화: 활력/표현</p>
            <p><span style="color:#eab308">●</span> 토: 안정/중심</p>
            <p><span style="color:#cbd5e1">●</span> 금: 정리/결단</p>
            <p class="col-span-2"><span style="color:#3b82f6">●</span> 수: 회복/유연성</p>
          </div>
        </div>
        <div class="mt-3 rounded-lg bg-black/30 p-3">
          <p class="text-xs text-stone-400">인생대운 흐름 그래프</p>
          <canvas id="flow-line" class="mt-2" height="160"></canvas>
        </div>
        <div class="mt-3 rounded-lg bg-black/30 p-3">
          <p class="text-xs text-amber-200">재미 포인트</p>
          <p id="fun-facts" class="mt-1 text-xs text-stone-200"></p>
        </div>
        <pre id="result" class="mt-3 max-h-[360px] overflow-auto rounded-lg bg-black/30 p-3 text-xs whitespace-pre-wrap"></pre>
      </div>
    </section>
  </main>
  <script>
    const form = document.getElementById("form");
    const result = document.getElementById("result");
    const summary = document.getElementById("summary");
    const luckTips = document.getElementById("luck-tips");
    const funFacts = document.getElementById("fun-facts");
    let radarChart = null;
    let flowChart = null;
    const ELEMENT_ORDER = ["wood", "fire", "earth", "metal", "water"];
    const ELEMENT_LABELS = ["목", "화", "토", "금", "수"];
    const ELEMENT_COLORS = ["#22c55e", "#ef4444", "#eab308", "#cbd5e1", "#3b82f6"];
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => entry.isIntersecting && entry.target.classList.add("in"));
    }, { threshold: 0.1 });
    document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
    window.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      document.body.style.setProperty("--mx", x + "%");
      document.body.style.setProperty("--my", y + "%");
    });
    function sortDaYunByAge(list) {
      return [...(list || [])].sort((a, b) => Number(a.startAge) - Number(b.startAge));
    }
    function renderCharts(saju) {
      if (!window.Chart || !saju) return;
      const counts = (saju.fiveElements && saju.fiveElements.counts) || {};
      const labels = ELEMENT_LABELS;
      const vals = ELEMENT_ORDER.map((k) => counts[k] || 0);
      const radar = document.getElementById("five-radar");
      const flow = document.getElementById("flow-line");
      if (radarChart) radarChart.destroy();
      if (flowChart) flowChart.destroy();
      radarChart = new Chart(radar, {
        type: "radar",
        data: {
          labels,
          datasets: [{
            label: "오행 균형",
            data: vals,
            borderColor: "#fcd34d",
            backgroundColor: "rgba(250,204,21,.12)",
            pointBackgroundColor: ELEMENT_COLORS,
            pointBorderColor: "#111827",
            pointRadius: 4,
          }],
        },
        options: {
          plugins: {
            legend: { labels: { color: "#e5e7eb" } },
            tooltip: {
              callbacks: {
                label: (ctx) => ctx.label + " 기운: " + ctx.parsed.r,
              },
            },
          },
          scales: { r: { ticks: { color: "#9ca3af", backdropColor: "transparent" }, grid: { color: "rgba(148,163,184,.3)" }, pointLabels: { color: "#d1d5db" } } },
        },
      });
      const flowSrc = sortDaYunByAge((saju.luckCycle && saju.luckCycle.daYunList) || []).slice(0, 8);
      const flowLabels = flowSrc.map((x) => String(x.startAge) + "~" + String(x.endAge) + "세");
      const flowVals = flowSrc.map((x, i) => 55 + ((Number(x.startAge) || i * 3) % 40));
      const current = saju.luckCycle && saju.luckCycle.currentDaYun;
      const currentIndex = flowSrc.findIndex((x) => current && x.startYear === current.startYear && x.endYear === current.endYear);
      flowChart = new Chart(flow, {
        type: "line",
        data: {
          labels: flowLabels,
          datasets: [{
            label: "대운 흐름",
            data: flowVals,
            borderColor: "#60a5fa",
            backgroundColor: "rgba(96,165,250,.2)",
            tension: 0.3,
            fill: true,
            pointRadius: flowVals.map((_, i) => (i === currentIndex ? 6 : 3)),
            pointBackgroundColor: flowVals.map((_, i) => (i === currentIndex ? "#f59e0b" : "#60a5fa")),
          }],
        },
        options: {
          plugins: {
            legend: { labels: { color: "#e5e7eb" } },
            tooltip: {
              callbacks: {
                title: (items) => "대운 구간: " + (items[0] ? items[0].label : ""),
                label: (ctx) => (ctx.dataIndex === currentIndex ? "현재 구간" : "흐름 지수") + ": " + ctx.parsed.y,
              },
            },
          },
          scales: { x: { ticks: { color: "#cbd5e1" } }, y: { ticks: { color: "#cbd5e1" }, min: 40, max: 100 } },
        },
      });
    }
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(form);
      const payload = {
        name: f.get("name"),
        birthDate: f.get("birthDate"),
        birthHour: Number(f.get("birthHour")),
        birthMinute: Number(f.get("birthMinute")),
        gender: f.get("gender"),
        calendarType: f.get("calendarType")
      };
      const res = await fetch("/api/premium-tojeong", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) return alert(data.message || "요청 실패");
      summary.textContent = data.summary || (data.profile.name + "님의 2026년 핵심 전략: 상반기 구조정비, 하반기 선택적 확장.");
      const guide = data.luckGuide || {};
      luckTips.innerHTML = [
        "오늘 실천: " + (guide.today || "-"),
        "이번 주 실천: " + (guide.thisWeek || "-"),
        "피해야 할 행동: " + (guide.avoid || "-"),
      ].map((x) => '<li>• ' + x + '</li>').join("");
      funFacts.textContent = "이번달 나에게 가장 좋은 날짜: " + ((data.funFacts && data.funFacts.bestDate) || "-") + "일 · 나에게 가장 좋은 숫자: " + ((data.funFacts && data.funFacts.bestNumber) || "-");
      renderCharts(data.saju);
      result.textContent = data.report;
    });
  </script>
</body>
</html>
