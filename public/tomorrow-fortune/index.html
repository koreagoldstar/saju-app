<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내일의 운세</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-5xl px-4 py-8">
    <a href="/" class="inline-flex items-center gap-2 rounded-full border border-amber-300/45 bg-amber-300/10 px-3 py-1 text-xs font-bold text-amber-200"><span>🌅</span><span>메인으로</span></a>
    <section class="mt-4 rounded-3xl border border-amber-300/30 bg-slate-900/70 p-6">
      <div class="grid gap-5 md:grid-cols-[120px_1fr] md:items-center">
        <img src="/assets/images/icon-tomorrow-fortune.svg" alt="내일의 운세" class="h-28 w-28 rounded-2xl border border-amber-300/40 object-cover" />
        <div>
          <p class="text-xs uppercase tracking-[0.2em] text-amber-200">Premium Daily+</p>
          <h1 class="mt-2 text-3xl font-bold">내일의 운세</h1>
          <p class="mt-2 text-sm text-stone-300">내일 하루에 맞춘 핵심 포인트와 간단 실천 가이드를 제공합니다.</p>
        </div>
      </div>
    </section>
    <section class="mt-6 grid gap-6 lg:grid-cols-2">
      <form id="form" class="rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4 space-y-3">
        <p class="text-sm font-semibold text-amber-200">정보를 넣어주세요</p>
        <input name="name" required placeholder="이름" class="w-full rounded-lg bg-slate-800 px-3 py-2" />
        <input type="date" name="birthDate" required class="w-full rounded-lg bg-slate-800 px-3 py-2" />
        <div class="grid grid-cols-2 gap-3">
          <input type="number" name="birthHour" min="0" max="23" required placeholder="시" class="rounded-lg bg-slate-800 px-3 py-2" />
          <input type="number" name="birthMinute" min="0" max="59" required placeholder="분" class="rounded-lg bg-slate-800 px-3 py-2" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <select name="gender" class="rounded-lg bg-slate-800 px-3 py-2"><option value="male">남성</option><option value="female">여성</option></select>
          <select name="calendarType" class="rounded-lg bg-slate-800 px-3 py-2"><option value="solar">양력</option><option value="lunar">음력</option></select>
        </div>
        <button class="w-full rounded-lg bg-gradient-to-r from-amber-500 to-yellow-300 px-4 py-2 font-semibold text-slate-900">내일 운세 보기</button>
      </form>
      <div class="rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4">
        <p class="text-sm font-semibold text-amber-200">결과물</p>
        <p id="summary" class="mt-3 rounded-lg bg-black/30 p-3 text-sm text-stone-200">입력 후 내일의 운세가 표시됩니다.</p>
        <pre id="result" class="mt-3 max-h-[320px] overflow-auto rounded-lg bg-black/30 p-3 text-xs whitespace-pre-wrap"></pre>
      </div>
    </section>
  </main>
  <script>
    const form = document.getElementById("form");
    const summary = document.getElementById("summary");
    const result = document.getElementById("result");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(form);
      const payload = {
        name: f.get("name"),
        birthDate: f.get("birthDate"),
        birthHour: Number(f.get("birthHour")),
        birthMinute: Number(f.get("birthMinute")),
        gender: f.get("gender"),
        calendarType: f.get("calendarType"),
      };
      const res = await fetch("/api/premium-tomorrow", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) return alert(data.message || "요청 실패");
      summary.textContent = data.summary;
      result.textContent = data.report;
    });
  </script>
</body>
</html>
