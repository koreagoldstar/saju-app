<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>띠 운세</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-5xl px-4 py-8">
    <a href="/" class="inline-flex items-center gap-2 rounded-full border border-amber-300/45 bg-amber-300/10 px-3 py-1 text-xs font-bold text-amber-200"><span>🐲</span><span>메인으로</span></a>
    <section class="mt-4 rounded-3xl border border-amber-300/30 bg-slate-900/70 p-6">
      <div class="grid gap-5 md:grid-cols-[120px_1fr] md:items-center">
        <img src="/assets/images/icon-zodiac-fortune.svg" alt="띠 운세" class="h-28 w-28 rounded-2xl border border-amber-300/40 object-cover" />
        <div>
          <p class="text-xs uppercase tracking-[0.2em] text-amber-200">Premium Zodiac</p>
          <h1 class="mt-2 text-3xl font-bold">띠 운세</h1>
          <p class="mt-2 text-sm text-stone-300">출생 연도 띠로 오늘 분위기를 짧게, 실천 팁은 더 짧게 적었어요.</p>
        </div>
      </div>
    </section>
    <section class="mt-6 grid gap-6 lg:grid-cols-2">
      <form id="form" class="rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4 space-y-3">
        <p class="text-sm font-semibold text-amber-200">정보를 넣어주세요</p>
        <input name="name" required placeholder="이름" class="w-full rounded-lg bg-slate-800 px-3 py-2" />
        <input type="date" name="birthDate" required class="w-full rounded-lg bg-slate-800 px-3 py-2" />
        <button class="w-full rounded-lg bg-gradient-to-r from-amber-500 to-yellow-300 px-4 py-2 font-semibold text-slate-900">띠 운세 보기</button>
      </form>
      <div class="rounded-2xl border border-amber-300/30 bg-slate-900/70 p-4">
        <p class="text-sm font-semibold text-amber-200">결과물</p>
        <p id="summary" class="mt-3 rounded-lg bg-black/30 p-3 text-sm text-stone-200">입력 후 띠 운세가 표시됩니다.</p>
        <div id="quick-cards" class="mt-3 grid gap-2 md:grid-cols-3"></div>
        <pre id="result" class="mt-3 max-h-[320px] overflow-auto rounded-lg bg-black/30 p-3 text-xs whitespace-pre-wrap"></pre>
      </div>
    </section>
  </main>
  <script>
    const form = document.getElementById("form");
    const summary = document.getElementById("summary");
    const quickCards = document.getElementById("quick-cards");
    const result = document.getElementById("result");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(form);
      const payload = { name: f.get("name"), birthDate: f.get("birthDate") };
      const res = await fetch("/api/premium-zodiac", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) return alert(data.message || "요청 실패");
      summary.textContent = data.summary;
      quickCards.innerHTML = (data.quickCards || []).map((x) =>
        '<div class="rounded-lg border border-amber-200/25 bg-black/30 p-3">' +
        '<p class="text-[11px] text-amber-200">' + x.title + '</p>' +
        '<p class="mt-1 text-xs leading-5 text-stone-200">' + x.text + '</p>' +
        '</div>'
      ).join("");
      result.textContent = data.report;
    });
  </script>
</body>
</html>
